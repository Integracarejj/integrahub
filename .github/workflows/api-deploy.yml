name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          cp api/package.json deploy/
          cp api/package-lock.json deploy/
          cp api/src/server.js deploy/server.js
          cp -r api/src deploy/src
          cp -r dist deploy/

      - name: Create deployment package
        run: cd deploy && zip -r ../deploy.zip .

      - uses: azure/webapps-deploy@v3
        with:
          app-name: Integrasource
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip

      - name: Azure login (for Easy Auth config)
        continue-on-error: true
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Allow anonymous API requests in Easy Auth
        continue-on-error: true
        run: |
          RG=$(az webapp list --query "[?name=='Integrasource'].resourceGroup" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not find App Service 'Integrasource'. Skipping auth update."
            exit 0
          fi
          az webapp auth update \
            --resource-group "$RG" \
            --name Integrasource \
            --enabled true \
            --action AllowAnonymous
          echo "Easy Auth set to AllowAnonymous for app Integrasource."
